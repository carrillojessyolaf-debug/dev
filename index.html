<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viernes - Asistente Virtual</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #00ffcc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .nucleo {
            width: 150px;
            height: 150px;
            border: 5px solid #00ffcc;
            border-radius: 50%;
            box-shadow: 0 0 20px #00ffcc, inset 0 0 20px #00ffcc;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .estado {
            font-size: 1.2rem;
            text-shadow: 0 0 10px #00ffcc;
        }
    </style>
</head>
<body>

    <div class="nucleo" id="boton-activar">
        <span>Lu / Il</span>
    </div>

    <div class="estado" id="texto-estado">Presiona el núcleo para iniciar</div>

    <script src="app.js"></script>
</body>
</html>
