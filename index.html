<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viernes - OS UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="canvas-circuitos"></canvas>

    <div class="contenedor-raiz-horizontal">
        
        <div class="barra-lateral">
            <button class="btn-holograma" title="Documento">📄<br>DOC</button>
            <button class="btn-holograma" id="btn-camara" onclick="document.getElementById('input-archivo').click()" title="Cámara">📷<br>CAM</button>
            <button class="btn-holograma" onclick="document.getElementById('input-archivo').click()" title="Galería">🖼️<br>GAL</button>
            <input type="file" id="input-archivo" accept="image/*" style="display: none;">
        </div>

        <div class="panel-centro">
            <div class="cara-robot" id="boton-activar">
                <div class="ojo"></div>
                <div class="ojo"></div>
            </div>

            <div class="contenedor-ondas">
                <div class="barra-onda"></div>
                <div class="barra-onda"></div>
                <div class="barra-onda"></div>
                <div class="barra-onda"></div>
                <div class="barra-onda"></div>
                <div class="barra-onda"></div>
                <div class="barra-onda"></div>
                <div class="barra-onda"></div>
                <div class="barra-onda"></div>
                <div class="barra-onda"></div>
            </div>
            
            <img id="vista-previa-img" style="max-width: 60px; max-height: 60px; margin-top: 15px; border-radius: 5px; display: none; border: 1px solid #00ffcc;">
        </div>

        <div class="barra-lateral">
            <button class="btn-holograma" title="Mood Relajado">😊<br>MOOD</button>
            <button class="btn-holograma" title="Mood Inteligente">🧠<br>INT</button>
            <button class="btn-holograma" title="Video">📹<br>VID</button>
            <button class="btn-holograma" title="Teléfono">📞<br>TEL</button>
            <button class="btn-holograma" title="Transmisión en Vivo">
                LIVE <span class="live-dot"></span>
            </button>
        </div>

    </div>

    <div class="panel-subtitulos">
        <div class="linea-subtitulo" id="subtitulo-1">[Viernes]: Iniciando sistemas. Bienvenido.</div>
        <div class="linea-subtitulo" id="subtitulo-2" style="color: #00ffcc;">[Viernes]: Esperando instrucciones.</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
